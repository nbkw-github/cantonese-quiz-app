<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>広東語クイズ</title>
    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/kuromoji@0.1.2/build/kuromoji.js"></script>
</head>
<body>
    <div id="app-container">

        <!-- スタート画面 -->
        <div id="start-screen">
            <h1>廣東話</h1>
            <div id="quiz-type-selection">
                <h2>問題の種類を選択してください</h2>
                <button id="vocab-quiz-btn" class="quiz-type-btn">四択問題</button>
                <button id="listening-quiz-btn" class="quiz-type-btn">リスニング問題</button>
                <button id="weak-point-quiz-btn" class="quiz-type-btn">弱点克服モード</button>
            </div>
            <div id="category-selection-container" class="hidden">
                <h2>カテゴリを選択してください</h2>
                <div id="category-selection">
                    <!-- カテゴリボタンはJSで生成 -->
                </div>
                <button id="back-to-type-selection-btn">戻る</button>
            </div>
        </div>

        <!-- クイズ画面 -->
        <div id="quiz-screen" class="hidden">
            <div id="header-container">
                <div id="score-container">
                    <p>スコア: <span id="score">0</span> / <span id="total-questions">0</span></p>
                </div>
                <div id="top-right-controls">
                    <button id="home-btn">&#127968;</button>
                    <button id="audio-toggle-btn">&#128266;</button>
                    <button id="rate-toggle-btn">&#128034;</button>
                </div>
            </div>

            <!-- Vocabulary Quiz Layout -->
            <div id="vocab-quiz-layout">
                <div id="question-container">
                    <p id="question"></p>
                </div>
                <div id="options-container">
                    <!-- 選択肢ボタンはJSで生成 -->
                </div>
            </div>

            <!-- Listening Build Quiz Layout -->
            <div id="listening-build-layout" class="hidden">
                <div id="listening-audio-container">
                    <!-- JSで生成 -->
                </div>
                <div id="listening-answer-area-container">
                    <div id="listening-answer-area"></div>
                </div>
                <div id="listening-word-bank">
                    <!-- JSで生成 -->
                </div>
            </div>

            <div id="feedback-container">
                <div id="feedback"></div>
            </div>
            <div class="action-buttons-container">
                <button id="action-btn" class="hidden"></button>
            </div>
        </div>

        <!-- 結果画面 -->
        <div id="result-screen" class="hidden">
            <h2>結果</h2>
            <p id="final-score"></p>
            <button id="restart-btn">もう一度挑戦</button>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
